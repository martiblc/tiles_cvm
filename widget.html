<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Carte CVM</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@2.11.0/dist/index.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        #map { width: 100%; height: 100%; }
        /* Style simple pour le popup */
        .maplibregl-popup-content { font-size: 13px; line-height: 1.4; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const protocol = new pmtiles.Protocol();
        maplibregl.addProtocol("pmtiles", protocol.tile);

        // Remplacez par votre URL GitHub Pages réelle
        const PMTILES_URL = "https://martiblc.github.io/tiles_cvm/data/communes_propres.pmtiles"
        const map = new maplibregl.Map({
            container: 'map',
            style: { "version": 8, "sources": {}, "layers": [] },
            center: [2.2137, 46.2276],
            zoom: 5.1
        });

        map.on('load', () => {
            map.addSource('communes-source', { type: 'vector', url: `pmtiles://${PMTILES_URL}` });
            map.addLayer({
                'id': 'communes-layer',
                'type': 'fill',
                'source': 'communes-source',
                'source-layer': 'communes',
                'paint': {
                    'fill-color': ['step', ['coalesce', ['get', 'val_max2526'], 0], '#d0f0c0', 0.5, '#ffffe0', 0.6, '#ffebaf', 1.5, '#ffd27f', 3.0, '#ffaa54', 4.0, '#ff7833', 5.0, '#ff3b1b', 6.0, '#ef002b', 7.0, '#cd004d', 8.0, '#a30066', 9.0, '#730075', 10.0, '#3f006f'],
                    'fill-opacity': 0.8
                }
            });
        });
    </script>
</body>
</html>
