<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Widget CVM</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@2.11.0/dist/index.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; }
        #map { width: 100%; height: 100%; }
        .search-overlay { position: absolute; top: 10px; left: 10px; z-index: 10; background: white; padding: 5px; border-radius: 4px; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
        #search-input { width: 200px; padding: 5px; }
    </style>
</head>
<body>

<div class="search-overlay">
    <input type="text" id="search-input" placeholder="Chercher une commune...">
</div>
<div id="map"></div>

<script>
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);

    // REMPLACEZ PAR VOTRE URL ABSOLUE
    const PMTILES_URL = "https://VOTRE_USER.github.io/VOTRE_REPO/data/communes_propres.pmtiles";

    const map = new maplibregl.Map({
        container: 'map',
        style: { "version": 8, "sources": {}, "layers": [] },
        center: [2.2137, 46.2276], zoom: 5.1
    });

    map.on('load', () => {
        map.addSource('communes-source', { type: 'vector', url: `pmtiles://${PMTILES_URL}` });

        map.addLayer({
            'id': 'communes-layer',
            'type': 'fill',
            'source': 'communes-source',
            'source-layer': 'communes',
            'paint': {
                'fill-color': ['step', ['coalesce', ['get', 'val_max2526'], 0], '#d0f0c0', 0.5, '#ffffe0', 0.6, '#ffebaf', 1.5, '#ffd27f', 3.0, '#ffaa54', 4.0, '#ff7833', 5.0, '#ff3b1b', 6.0, '#ef002b', 7.0, '#cd004d', 8.0, '#a30066', 9.0, '#730075', 10.0, '#3f006f'],
                'fill-opacity': 0.85
            }
        });

        // Contour de surbrillance
        map.addLayer({
            'id': 'communes-highlight',
            'type': 'line',
            'source': 'communes-source',
            'source-layer': 'communes',
            'paint': { 'line-color': '#000000', 'line-width': 2 },
            'filter': ['==', ['get', 'code_insee'], '']
        });

        const popup = new maplibregl.Popup({ closeButton: false, closeOnClick: false });

        map.on('mousemove', 'communes-layer', (e) => {
            const props = e.features[0].properties;
            map.getCanvas().style.cursor = 'pointer';
            
            const html = `<strong>${props.libelle}</strong><br>Valeur max: ${props.val_max2526} μg/L`;
            popup.setLngLat(e.lngLat).setHTML(html).addTo(map);
            map.setFilter('communes-highlight', ['==', ['get', 'code_insee'], props.code_insee]);
        });

        map.on('mouseleave', 'communes-layer', () => {
            map.getCanvas().style.cursor = '';
            popup.remove();
            map.setFilter('communes-highlight', ['==', ['get', 'code_insee'], '']);
        });
    });
</script>
</body>
</html>
